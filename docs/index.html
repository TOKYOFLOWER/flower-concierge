}

body {

/* Header */
.header {
  text-align: center;
  padding: 24px 16px 16px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
  position: relative;
  z-index: 1;
}
.header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
}
.header p {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

/* Concierge icon */
.concierge-icon {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  border-radius: 50%;
  overflow: hidden;
}

/* Message bubbles */
.message {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  animation: fadeIn 0.4s ease;
}
.message.bot { justify-content: flex-start; }
.message.user { justify-content: flex-end; }

.bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.6;
}
.message.bot .bubble {
  background: var(--bubble-bot);
  border-bottom-left-radius: 4px;
}
.message.user .bubble {
  background: var(--bubble-user);
  border-bottom-right-radius: 4px;
  color: var(--gold-light);
}

/* Seasonal banner */
.seasonal-banner {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  transition: background 0.3s;
  animation: fadeIn 0.5s ease;
}
.seasonal-banner:hover {
  background: rgba(201,168,76,0.25);
}
.seasonal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 4px;
}
.seasonal-desc {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Choice buttons */
.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0;
  animation: fadeIn 0.4s ease;
}
.choices button {
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s;
}
.choices button:hover {
  background: var(--gold);
  color: var(--bg);
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(201,168,76,0.3);
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  animation: fadeIn 0.3s ease;
}
.loading-dots {
  display: flex;
  gap: 4px;
}
.loading-dots span {
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  flex-direction: column;
  gap: 12px;
  padding: 8px 0;
  animation: fadeIn 0.5s ease;

.product-card {

.product-image {

  flex-shrink: 0;
  background: #152015;
  display: flex;
  align-items: center;
  justify-content: center;

.product-image img {

  height: 100%;

.product-image svg {

  height: 48px;

  padding: 12px;

  gap: 6px;

.product-name {

  line-height: 1.4;

  overflow: hidden;

.product-price {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gold);
}
.product-reason {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.5;
}
.flower-language {

  margin-top: 2px;

  font-size: 0.65rem;
  font-weight: 700;

  border-radius: 4px;

.language-text {
  font-size: 0.72rem;
  color: var(--gold-light);
  line-height: 1.4;

  font-weight: 700;

  align-self: flex-start;

.product-link:hover {

  transform: translateY(-1px);

.restart {
  text-align: center;
  padding: 8px 0;
  animation: fadeIn 0.3s ease;

.restart button {
  font-family: 'Noto Sans JP', sans-serif;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s;
}
.restart button:hover {
  background: var(--gold);
  color: var(--bg);
  transform: translateY(-1px);

  padding-bottom: 8px;

  min-width: 200px;

  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 10px;

  margin-bottom: 6px;

  margin-bottom: 6px;
  line-height: 1.4;

  color: var(--text-muted);
  line-height: 1.5;

  display: inline-block;
  margin-top: 8px;
  font-size: 0.65rem;
  background: rgba(201,168,76,0.15);
  color: var(--gold);
  padding: 2px 8px;
  border-radius: 10px;

/* Petal effect */
.petal {
  position: fixed;
  top: -20px;
  border-radius: 50% 0 50% 0;
  opacity: 0.8;
  pointer-events: none;
  z-index: 9999;
  animation: petalFall linear forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}
@keyframes petalFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* Scrollbar */
.chat-container::-webkit-scrollbar { width: 4px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }
.chat-container::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

@media (max-width: 480px) {
  .product-image { width: 90px; min-height: 110px; }
  .case-card { min-width: 170px; max-width: 170px; }
  .concierge-icon { width: 30px; height: 30px; }
}
</style>
</head>

  function createPetalEffect() {
    var colors = ['#c9a84c', '#e8b4b8', '#f4d4d4', '#d4a843', '#f0c8b0'];
    for (var i = 0; i < 12; i++) {
      var petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.cssText = [
        'left:' + (Math.random() * 100) + 'vw',
        'animation-duration:' + (1 + Math.random()) + 's',
        'animation-delay:' + (Math.random() * 0.5) + 's',
        'background:' + colors[Math.floor(Math.random() * colors.length)],
        'width:' + (8 + Math.random() * 8) + 'px',
        'height:' + (12 + Math.random() * 8) + 'px'
      ].join(';');
      document.body.appendChild(petal);
      setTimeout(function(p) { p.remove(); }, 2000, petal);
    }
  }

  // === Flower language ===
  function detectFlowerType(name) {
    var flowers = Object.keys(flowerLanguage);
    for (var i = 0; i < flowers.length; i++) {
      if (name.indexOf(flowers[i]) !== -1) return flowers[i];
    }
    return null;
  }

  // === Messages ===
  function addBotMessage(text) {
    var div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = CONCIERGE_ICON + '<div class="bubble">' + text + '</div>';
    chat.appendChild(div);
    scrollToBottom();
  }

  function addUserMessage(text) {
    var div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = '<div class="bubble">' + text + '</div>';
    chat.appendChild(div);
    scrollToBottom();
  }

  function addChoices(options, callback) {
    var div = document.createElement('div');
    div.className = 'choices';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.textContent = opt;
      btn.addEventListener('click', function() {
        createPetalEffect();
        div.remove();
        callback(opt);
      });
      div.appendChild(btn);
    });
    chat.appendChild(div);
    scrollToBottom();
  }

  function showLoading() {
    var div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'loading';
    div.innerHTML = CONCIERGE_ICON + '<div class="bubble"><div class="loading">'
      + '<span style="font-size:0.85rem">素敵なお花を探しています</span>'
      + '<div class="loading-dots"><span></span><span></span><span></span></div>'
      + '</div></div>';
    chat.appendChild(div);
    scrollToBottom();
  }

  function removeLoading() {
    var el = document.getElementById('loading');
    if (el) el.remove();
  }

  // === Seasonal banner ===
  function showSeasonalBanner() {
    var month = new Date().getMonth() + 1;
    var flower = seasonalFlowers[month];
    if (!flower) return;

    var div = document.createElement('div');
    div.className = 'seasonal-banner';
    div.innerHTML = '<div class="seasonal-title">' + flower.emoji + ' 今月のおすすめ: ' + escapeHtml(flower.name) + '</div>'
      + '<div class="seasonal-desc">' + escapeHtml(flower.desc) + '</div>';
    div.addEventListener('click', function() {
      div.remove();
      answers.purpose = '';
      currentStep = 0;
      // Search with the seasonal flower name as freeword
      submitSearchDirect(flower.name);
    });
    chat.appendChild(div);
    scrollToBottom();
  }

  // === Products ===
  function showProducts(products) {
    var div = document.createElement('div');
    div.className = 'products';

    products.forEach(function(p) {
      var imageHtml;
      if (p.image_url) {
        imageHtml = '<img src="' + escapeHtml(p.image_url) + '" alt="' + escapeHtml(p.name) + '">';
      } else {
        imageHtml = FLOWER_SVG;
      }

      var linkHtml = '';
      if (p.rakuten_url) {
        linkHtml = '<a class="product-link" href="' + escapeHtml(p.rakuten_url) + '" target="_blank" rel="noopener">楽天市場で見る &rarr;</a>';
      }

      // Flower language
      var langHtml = '';
      var flowerType = detectFlowerType(p.name);
      if (flowerType && flowerLanguage[flowerType]) {
        langHtml = '<div class="flower-language">'
          + '<span class="language-badge">花言葉</span>'
          + '<span class="language-text">' + escapeHtml(flowerLanguage[flowerType].general) + '</span>'
          + '</div>';
      }

      var card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = '<div class="product-image">' + imageHtml + '</div>'
        + '<div class="product-info">'
        + '<div class="product-name">' + escapeHtml(cleanProductName(p.name)) + '</div>'
        + '<div class="product-price">&yen;' + Number(p.price).toLocaleString() + '</div>'
        + '<div class="product-reason">' + escapeHtml(p.reason || '') + '</div>'
        + langHtml
        + linkHtml
        + '</div>';
      div.appendChild(card);
    });

    chat.appendChild(div);
    scrollToBottom();
  }

  function showRestart() {
    var div = document.createElement('div');
    div.className = 'restart';
    var btn = document.createElement('button');
    btn.textContent = 'もう一度探す';
    btn.addEventListener('click', function() {
      startOver();
    });
    div.appendChild(btn);
    chat.appendChild(div);
    scrollToBottom();
  }

  // === Case studies ===
  function showCaseStudies() {
    var section = document.createElement('div');
    section.className = 'cases-section';
    var title = document.createElement('div');
    title.className = 'cases-title';
    title.textContent = '\uD83D\uDC90 銀座東京フラワーの贈り物事例';
    section.appendChild(title);

    var scroll = document.createElement('div');
    scroll.className = 'cases-scroll';
    caseStudies.forEach(function(c) {
      var card = document.createElement('div');
      card.className = 'case-card';
      card.innerHTML = '<div class="case-emoji">' + c.emoji + '</div>'
        + '<div class="case-title">' + escapeHtml(c.title) + '</div>'
        + '<div class="case-desc">' + escapeHtml(c.desc) + '</div>'
        + '<span class="case-tag">' + escapeHtml(c.tag) + '</span>';
      scroll.appendChild(card);
    });
    section.appendChild(scroll);
    chat.appendChild(section);
    scrollToBottom();
  }

  // === Utilities ===
  function cleanProductName(name) {
    return name
      .replace(/【[^】]*】/g, '')
      .replace(/\[[^\]]*\]/g, '')
      .replace(/　/g, ' ')
      .replace(/\s+/g, ' ')
      .replace(/送料無料|送料込み|送料別|楽天|あす楽[^\s]*/g, '')
      .replace(/[0-9]{4}年?/g, '')
      .replace(/2026|2025/g, '')
      .trim()
      .substring(0, 30);
  }

  function escapeHtml(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
    });
  }

  // === Flow ===
  function askQuestion(step) {
    var q = QUESTIONS[step];
    addBotMessage(q.text);
    addChoices(q.options, function(selected) {
      addUserMessage(selected);
      answers[q.key] = selected;
      currentStep++;
      if (currentStep < QUESTIONS.length) {
        setTimeout(function() { askQuestion(currentStep); }, 300);
      } else {
        setTimeout(function() { submitSearch(); }, 300);
      }
    });
  }

  function submitSearch() {
    showLoading();

    var categoryValue = answers.category === 'おまかせ' ? '' : answers.category;

    var payload = {
      purpose: answers.purpose,
      budget: BUDGET_MAP[answers.budget] || 5500,
      recipient: answers.recipient,
      category: categoryValue,
      freeword: ''
    };

    doSearch(payload);
  }

  function submitSearchDirect(flowerName) {
    showLoading();
    doSearch({
      purpose: '',
      budget: 99999,
      recipient: '',
      category: '',
      freeword: flowerName
    });
  }

  function doSearch(payload) {
    var url = new URL(API_URL);
    url.searchParams.set('purpose', payload.purpose || '');
    url.searchParams.set('budget', payload.budget || 99999);
    url.searchParams.set('recipient', payload.recipient || '');
    url.searchParams.set('category', payload.category || '');
    url.searchParams.set('freeword', payload.freeword || '');

    fetch(url.toString(), {
      method: 'GET',
      redirect: 'follow'
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      removeLoading();
      if (data.status === 'ok' && data.products && data.products.length > 0) {
        addBotMessage('お客様にぴったりのお花をお選びいたしました。');
        showProducts(data.products);
      } else {
        addBotMessage('申し訳ございません。条件に合うお花が見つかりませんでした。条件を変えてお試しください。');
      }
      showRestart();
      showCaseStudies();
    })
    .catch(function() {
      removeLoading();
      addBotMessage('通信エラーが発生しました。お手数ですがもう一度お試しください。');
      showRestart();
    });
  }

  function startOver() {
    chat.innerHTML = '';
    currentStep = 0;
    answers = {};
    addBotMessage('いらっしゃいませ。銀座東京フラワーのフラワーコンシェルジュでございます。<br>お花選びのお手伝いをさせていただきます。');
    setTimeout(function() {
      showSeasonalBanner();
      setTimeout(function() { askQuestion(0); }, 300);
    }, 500);
  }

  // 初期表示
  startOver();
})();
</script>
</body>
</html>
